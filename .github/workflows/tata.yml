name: TataPlay Api For Soft

on:
  schedule:
    - cron: '0 * * * *' 
  workflow_dispatch: 

permissions:
  contents: write 

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests
        sudo apt-get install -y p7zip-full

    - name: Extract Secure Zip
      env:
        ZIP_PASS: ${{ secrets.ZIP_PASSWORD }}
      run: |
        7z x secure_data.zip -p"$ZIP_PASS" -y

    - name: Run Python Script
      run: |
        python main.py

    - name: Commit and Push Output
      run: |
      
        rm main.py
        rm soft-data.json
        
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add soft-data.json
        git commit -m "Auto-updated soft-data.json by GitHub Actions" || echo "No changes to commit"
        git push
